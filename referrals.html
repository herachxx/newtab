<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damumed — Направления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
<base target="_blank">
</head>
<body data-page="referrals">
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">D</div>
                <span class="logo-text">Damu<span class="logo-accent">med</span></span>
            </a>
            <nav class="topbar-nav">
                <a href="index.html" class="nav-item">Приём</a>
                <a href="patients.html" class="nav-item">Пациенты</a>
                <a href="schedule.html" class="nav-item">Расписание</a>
                <a href="referrals.html" class="nav-item active">Направления</a>
                <a href="reports.html" class="nav-item">Отчёты</a>
            </nav>
        </div>
        <div class="topbar-right">
            <div class="user-chip">
                <div class="user-avatar">АС</div>
                <div><div class="user-name">Д-р Асанов</div><div class="user-role">Терапевт</div></div>
            </div>
        </div>
    </header>

    <div class="workspace" style="grid-template-columns:1fr;">
        <main class="main-content" style="padding:24px 28px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div>
                    <h1 style="font-size:22px;font-weight:700;">Направления пациентов</h1>
                    <p style="font-size:13px;color:var(--text-muted);margin-top:3px;">Активных: <span id="ref-active">0</span></p>
                </div>
                <button class="btn btn-primary" id="ref-create">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M12 5v14M5 12h14"/></svg>
                    Создать направление
                </button>
            </div>

            <div class="stat-grid" id="ref-stats"></div>

            <div class="form-section" style="padding:0;overflow:hidden;">
                <div style="overflow-x:auto;">
                    <table class="data-table" id="ref-table">
                        <thead>
                            <tr>
                                <th>№</th>
                                <th>Пациент</th>
                                <th>Направлен к</th>
                                <th>Диагноз</th>
                                <th>Создано</th>
                                <th>Срок</th>
                                <th>Статус</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="ref-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-stack" id="toast-stack"></div>
    <script src="main.js"></script>
</body>
</html>
