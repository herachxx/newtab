<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damumed — Пациенты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
<base target="_blank">
</head>
<body data-page="patients">
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">D</div>
                <span class="logo-text">Damu<span class="logo-accent">med</span></span>
            </a>
            <nav class="topbar-nav">
                <a href="index.html" class="nav-item">Приём</a>
                <a href="patients.html" class="nav-item active">Пациенты</a>
                <a href="schedule.html" class="nav-item">Расписание</a>
                <a href="referrals.html" class="nav-item">Направления</a>
                <a href="reports.html" class="nav-item">Отчёты</a>
            </nav>
        </div>
        <div class="topbar-right">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="search" placeholder="Поиск..." class="search-input" id="patients-search">
            </div>
            <div class="user-chip">
                <div class="user-avatar">АС</div>
                <div><div class="user-name">Д-р Асанов</div><div class="user-role">Терапевт</div></div>
            </div>
        </div>
    </header>

    <div class="workspace" style="grid-template-columns:1fr;">
        <main class="main-content" style="padding:24px 28px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div>
                    <h1 style="font-size:22px;font-weight:700;color:var(--text-primary);">Реестр пациентов</h1>
                    <p style="font-size:13px;color:var(--text-muted);margin-top:3px;">Всего: <span id="patients-total">0</span></p>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-outline" id="patients-export">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Экспорт CSV
                    </button>
                    <button class="btn btn-primary" id="patients-add">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M12 5v14M5 12h14"/></svg>
                        Новый пациент
                    </button>
                </div>
            </div>

            <div class="form-section" style="padding:12px 16px;margin-bottom:16px;">
                <div class="form-grid four-cols" style="align-items:end;">
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="filter-status" class="form-control"><option value="all">Все</option><option value="active">Активные</option><option value="done">Завершённые</option></select>
                    </div>
                    <div class="form-group">
                        <label>Пол</label>
                        <select id="filter-gender" class="form-control"><option value="all">Все</option><option value="male">Мужской</option><option value="female">Женский</option></select>
                    </div>
                    <div class="form-group">
                        <label>Возраст</label>
                        <select id="filter-age" class="form-control"><option value="all">Все</option><option value="0-30">0-30</option><option value="31-50">31-50</option><option value="51+">51+</option></select>
                    </div>
                    <div class="form-group">
                        <button class="btn btn-outline" id="filter-apply" style="width:100%;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                            Применить
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-section" style="padding:0;overflow:hidden;">
                <div style="overflow-x:auto;">
                    <table class="data-table" id="patients-table">
                        <thead>
                            <tr>
                                <th style="width:36px;"><input type="checkbox" id="select-all"></th>
                                <th>ФИО</th>
                                <th>ИИН</th>
                                <th>Дата рождения</th>
                                <th>Пол</th>
                                <th>Телефон</th>
                                <th>Статус</th>
                                <th style="width:60px;"></th>
                            </tr>
                        </thead>
                        <tbody id="patients-tbody"></tbody>
                    </table>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);">
                    <span style="font-size:12px;color:var(--text-muted);" id="patients-shown">Показано 0 из 0</span>
                    <div style="display:flex;gap:3px;" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-stack" id="toast-stack"></div>
    <script src="main.js"></script>
</body>
</html>
