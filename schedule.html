<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damumed — Расписание</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
<base target="_blank">
</head>
<body data-page="schedule">
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">D</div>
                <span class="logo-text">Damu<span class="logo-accent">med</span></span>
            </a>
            <nav class="topbar-nav">
                <a href="index.html" class="nav-item">Приём</a>
                <a href="patients.html" class="nav-item">Пациенты</a>
                <a href="schedule.html" class="nav-item active">Расписание</a>
                <a href="referrals.html" class="nav-item">Направления</a>
                <a href="reports.html" class="nav-item">Отчёты</a>
            </nav>
        </div>
        <div class="topbar-right">
            <div class="user-chip">
                <div class="user-avatar">АС</div>
                <div><div class="user-name">Д-р Асанов</div><div class="user-role">Терапевт</div></div>
            </div>
        </div>
    </header>

    <div class="workspace" style="grid-template-columns:1fr;">
        <main class="main-content" style="padding:24px 28px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div>
                    <h1 style="font-size:22px;font-weight:700;">Расписание приёма</h1>
                    <p style="font-size:13px;color:var(--text-muted);margin-top:3px;">Неделя: 20 — 26 апреля 2026</p>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-outline" id="sch-prev">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="btn btn-outline" id="sch-today">Сегодня</button>
                    <button class="btn btn-outline" id="sch-next">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>

            <div class="schedule-grid" id="schedule-grid"></div>

            <div style="display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;">
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
                    <div style="width:14px;height:14px;background:var(--bg-active);border:1px solid #bae6fd;border-radius:3px;"></div> Занято
                </div>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
                    <div style="width:14px;height:14px;background:var(--bg-body);border:1.5px dashed var(--border);border-radius:3px;"></div> Свободно
                </div>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
                    <div style="width:14px;height:14px;background:var(--warning-bg);border:1px solid var(--warning);border-radius:3px;"></div> Обед
                </div>
            </div>
        </main>
    </div>

    <div class="toast-stack" id="toast-stack"></div>
    <script src="main.js"></script>
</body>
</html>
